# TEI Addon — Production (CPU)
#
# CPU-only by default: pulls the prebuilt `cpu-latest` image and omits
# any GPU device reservations. Works on any host without the NVIDIA
# container toolkit installed.
#
# For GPU hosts:
#   - Switch the image tag below from `cpu-latest` to `latest` (CUDA).
#   - Re-add a `deploy: resources: reservations: devices:` block
#     reserving an nvidia device. Example in git history prior to the
#     cpu-latest switch.

services:
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: ape_tei
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ${MODEL_DIR:-/srv/ape/models/glyph-embedder-v1/onnx}:/model:ro
    command:
      - --model-id=/model
      - --port=80
      # TEI normally reads pooling strategy from `1_Pooling/config.json`
      # in the model directory (HF sentence-transformers format). Bare
      # ONNX exports don't ship that file, so we pass the strategy
      # explicitly. Default is `mean` (most common for sentence embedders);
      # set TEI_POOLING=cls or TEI_POOLING=splade if that's what your
      # model was trained with. Match the training recipe, not the
      # default — pooling mismatch produces semantically off vectors
      # silently (same dim, wrong geometry).
      - --pooling=${TEI_POOLING:-mean}
    networks:
      - net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  net:
