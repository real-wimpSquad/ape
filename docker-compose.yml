# Production docker-compose using pre-built images from GitHub Container Registry
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  # Qdrant vector database (internal only in production)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    # To enable Qdrant auth, set an API key here and add qdrant_api_key to
    # the matching concept space in ape.toml
    # environment:
    #   - QDRANT__SERVICE__API_KEY=your-qdrant-api-key
    volumes:
      - ./qdrant:/qdrant/storage
    networks:
      - atomic_pumpkin

  # TLS reverse proxy — terminates HTTPS, forwards to APE gateway
  # Place your certs in ./certs/ (tls.crt + tls.key) or use self-signed:
  #   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
  #     -keyout certs/tls.key -out certs/tls.crt -subj '/CN=ape.local'
  caddy:
    image: caddy:2-alpine
    container_name: ape_caddy
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs:ro
      - caddy_data:/data
    depends_on:
      ape:
        condition: service_healthy
    networks:
      - atomic_pumpkin

  # APE Engine — single Rust binary serving Bridge, MCP, and Gateway
  ape:
    image: ghcr.io/real-wimpsquad/atomic-pumpkin/ape:stable
    container_name: ape
    restart: unless-stopped
    stop_grace_period: 35s
    # No host ports exposed — Caddy handles external traffic
    # Uncomment for direct access (debugging only):
    # ports:
    #   - "8070:8070"
    environment:
      - RUST_LOG=ape=info
      - TOKIO_WORKER_THREADS=2
      - APE_CONFIG=/app/ape.toml
    volumes:
      - ./ape.toml:/app/ape.toml:ro
      - ape_data:/app/data
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - atomic_pumpkin
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8070/health || exit 1"]
      start_period: 60s
      interval: 15s
      timeout: 5s
      retries: 5

  # Redis — caching, context stash, session verbatim (internal only)
  redis:
    image: redis:7-alpine
    container_name: ape_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    # To enable Redis auth, set requirepass here and update redis_url in ape.toml
    # to redis://:yourpassword@redis:6379
    command: redis-server --appendonly yes --appendfsync everysec --save 60 1
    networks:
      - atomic_pumpkin
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  ape_data:
  redis_data:
  caddy_data:

networks:
  atomic_pumpkin:
    driver: bridge
