# Production docker-compose using pre-built images from GitHub Container Registry
# Usage: docker-compose -f docker-compose.prod.yml up -d
#
# Core stack: qdrant + ape + redis. APE listens on 127.0.0.1:8070 — point your
# ingress (host nginx/caddy/traefik/k8s/Cloudflare Tunnel/etc) at it.
#
# For zero-config bundled TLS, enable the caddy addon:
#   make ADDONS="caddy"

services:
  # Qdrant vector database (internal only)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    # To enable Qdrant auth, set an API key here and add qdrant_api_key to
    # the matching concept space in ape.toml
    # environment:
    #   - QDRANT__SERVICE__API_KEY=your-qdrant-api-key
    volumes:
      - ./qdrant:/qdrant/storage
    networks:
      - net

  # APE Engine — single Rust binary serving Bridge, MCP, and Gateway
  # Bound to 127.0.0.1 so it's reachable by a host-level ingress but not
  # exposed publicly. Bundled Caddy addon reaches it over the docker network.
  ape:
    image: ghcr.io/real-wimpsquad/atomic-pumpkin/ape:stable
    container_name: ape
    restart: unless-stopped
    stop_grace_period: 35s
    ports:
      - "127.0.0.1:8070:8070"
    environment:
      - RUST_LOG=ape=info
      - TOKIO_WORKER_THREADS=2
      - APE_CONFIG=/app/ape.toml
    volumes:
      - ./ape.toml:/app/ape.toml
      - ape_data:/app/data
      - ./models:/models:ro
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8070/health || exit 1"]
      start_period: 60s
      interval: 15s
      timeout: 5s
      retries: 5

  # Redis — caching, context stash, session verbatim (internal only)
  redis:
    image: redis:7-alpine
    container_name: ape_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    # To enable Redis auth, set requirepass here and update redis_url in ape.toml
    # to redis://:yourpassword@redis:6379
    command: redis-server --appendonly yes --appendfsync everysec --save 60 1
    networks:
      - net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    
  # LiteLLM Proxy
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_API_BASE=http://host.docker.internal:11434
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    networks:
      - atomic_pumpkin
  
  # Engine Orchestrator
  engine-orchestrator:
    image: ghcr.io/real-wimpsquad/atomic-pumpkin/engine-orchestrator:latest
    build: ./engine-orchestrator
    ports:
      - "8068:8080"
    environment:
      - ENGINE_API_URL=http://engine:8069
      - LITELLM_URL=http://litellm:4000
      - SESSION_STORE=redis://redis:6379
    depends_on:
      - engine
      - litellm
      - redis
    networks:
      - atomic_pumpkin
  
  # Session storage
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
  
  # Chat UI
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://engine-orchestrator:8068/v1
      - OPENAI_API_KEY=sk-atomic-pumpkin  # Dummy, validated by orchestrator
    volumes:
      - ./open-webui-data:/app/backend/data
    depends_on:
      - engine-orchestrator
    networks:
      - atomic_pumpkin

volumes:
  ape_data:
  redis_data:

networks:
  net:
    driver: bridge
